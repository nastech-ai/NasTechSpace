<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browser Component Harness</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #05070a;
        color: #e7edf5;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      .toolbar,
      .actions {
        display: grid;
        gap: 0.6rem;
        padding: 0.75rem;
        background: rgba(10, 15, 22, 0.95);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .toolbar {
        grid-template-columns: minmax(0, 1fr) repeat(6, auto);
      }

      .actions {
        grid-template-columns: 8rem minmax(0, 1fr) minmax(0, 1fr) repeat(5, auto);
      }

      input,
      button {
        font: inherit;
        border-radius: 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      input {
        min-width: 0;
        padding: 0.7rem 0.8rem;
        background: rgba(255, 255, 255, 0.06);
        color: inherit;
      }

      button {
        padding: 0.7rem 0.85rem;
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        cursor: pointer;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .content {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 28rem;
      }

      webview {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        background: #fff;
      }

      .sidebar {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto minmax(0, 1fr);
        border-left: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(4, 8, 12, 0.98);
      }

      .label {
        padding: 0.6rem 0.75rem;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(231, 237, 245, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      pre {
        margin: 0;
        padding: 0.75rem;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="toolbar">
        <input id="url-input" value="https://www.novinky.cz" spellcheck="false">
        <button id="open-button" type="button">Open</button>
        <button id="back-button" type="button">Back</button>
        <button id="forward-button" type="button">Forward</button>
        <button id="reload-button" type="button">Reload</button>
        <button id="state-button" type="button">State</button>
        <button id="content-button" type="button">Content</button>
      </div>
      <div class="actions">
        <input id="reference-input" placeholder="ref id" spellcheck="false">
        <input id="value-input" placeholder="type value" spellcheck="false">
        <input id="selector-input" placeholder='selectors JSON, e.g. ["main"]' spellcheck="false">
        <button id="detail-button" type="button">Detail</button>
        <button id="click-button" type="button">Click</button>
        <button id="type-button" type="button">Type</button>
        <button id="type-submit-button" type="button">Type+Enter</button>
        <button id="submit-button" type="button">Submit</button>
        <button id="scroll-button" type="button">Scroll</button>
        <button id="dom-button" type="button">DOM</button>
      </div>
      <div class="content">
        <webview
          id="browser-webview"
          partition="space-browser-browser-1"
          src="about:blank"
        ></webview>
        <div class="sidebar">
          <div class="label">Last Result</div>
          <pre id="result-output"></pre>
          <div class="label">Harness Log</div>
          <pre id="log-output"></pre>
        </div>
      </div>
    </div>
    <script type="module" src="./renderer.mjs"></script>
  </body>
</html>
