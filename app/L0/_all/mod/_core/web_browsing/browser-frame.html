<html>
  <head>
    <meta charset="utf-8" />
    <title>Browser</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(49, 90, 184, 0.22), transparent 42%),
          linear-gradient(180deg, #07101b, #040a12 72%);
        color: rgba(239, 245, 255, 0.88);
        font: 500 16px/1.5 "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      .browser-frame-empty-state {
        display: grid;
        justify-items: center;
        gap: 1.25rem;
        width: min(100%, 22rem);
        padding: 2rem;
        text-align: center;
      }

      .browser-frame-empty-state-copy {
        display: grid;
        gap: 1rem;
        width: min(100%, 19rem);
      }

      .browser-frame-empty-state-figure {
        display: grid;
        place-items: center;
        transform-origin: center;
        animation: browser-frame-empty-float 8.4s linear infinite;
      }

      .browser-frame-empty-state img {
        width: clamp(112px, 18vw, 168px);
        max-width: 100%;
        transform-origin: 52% 56%;
      }

      .browser-frame-empty-state p {
        margin: 0;
        letter-spacing: 0.01em;
      }

      .browser-frame-empty-state-note {
        margin-top: 1rem;
        color: rgba(239, 245, 255, 0.68);
        font-size: 0.95rem;
      }

      .browser-frame-runtime-variant[hidden] {
        display: none !important;
      }

      .browser-frame-download-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        width: 100%;
        min-height: 3.5rem;
        padding: 0.95rem 1rem;
        border: 1px solid transparent;
        border-radius: 8px;
        color: #04101d;
        font-weight: 700;
        line-height: 1.2;
        text-decoration: none;
        background: linear-gradient(135deg, #94bcff, #79edd8);
        transition:
          background-color 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .browser-frame-download-link:hover {
        border-color: transparent;
        background: linear-gradient(135deg, #a4c7ff, #8ef2df);
      }

      .browser-frame-download-link:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(125, 220, 255, 0.12);
      }

      .browser-frame-download-label {
        min-width: 0;
      }

      .browser-frame-icon-group {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        color: currentColor;
        flex: 0 0 auto;
      }

      .browser-frame-icon {
        width: 1.15rem;
        height: 1.15rem;
        fill: currentColor;
      }

      @keyframes browser-frame-empty-float {
        0% {
          transform: translate3d(0, 0, 0) rotate(-6deg);
        }

        25% {
          transform: translate3d(5px, -5px, 0) rotate(-2deg);
        }

        50% {
          transform: translate3d(0, -8px, 0) rotate(5deg);
        }

        75% {
          transform: translate3d(-5px, -4px, 0) rotate(1deg);
        }

        100% {
          transform: translate3d(0, 0, 0) rotate(-6deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .browser-frame-empty-state-figure {
          animation: none;
        }
      }
    </style>
  </head>
  <body>

    <main class="browser-frame-empty-state" aria-label="Browser placeholder">

            aria-label="Download the latest native desktop app release in a new window"

          </a>

        <div class="browser-frame-runtime-variant" data-browser-frame-variant="app" hidden>
          <p>Embedded browser is in active development and may still have some limitations.</p>
          <p class="browser-frame-empty-state-note">Use the address bar above to open a page, or tell NasTech what to do.</p>
        </div>
      </div>
    </main>
    <script>
      (function syncBrowserFrameRuntime() {
        const CONTEXT_SELECTOR = "x-context[data-runtime]";
        const RUNTIME_ATTRIBUTE = "data-runtime";
        const TAGS_ATTRIBUTE = "data-tags";
        const RUNTIME_APP = "app";
        const RUNTIME_BROWSER = "browser";

        function normalizeText(value) {
          return String(value || "").trim();
        }

        function readRuntimeContext(root) {
          const runtime = normalizeText(
            root?.querySelector?.(CONTEXT_SELECTOR)?.getAttribute?.(RUNTIME_ATTRIBUTE)
          );
          return runtime === RUNTIME_APP || runtime === RUNTIME_BROWSER
            ? runtime
            : "";
        }

        function readParentRuntimeContext() {
          try {
            if (!globalThis.parent || globalThis.parent === globalThis) {
              return "";
            }

            return readRuntimeContext(globalThis.parent.document);
          } catch {
            return "";
          }
        }

        function resolveRuntimeContext() {
          return readParentRuntimeContext()
            || readRuntimeContext(globalThis.document)
            || (globalThis.parent === globalThis ? RUNTIME_APP : RUNTIME_BROWSER);
        }

        function syncRuntimeMarker(runtime) {
          const marker = globalThis.document.querySelector("[data-browser-frame-runtime]");
          if (!marker?.setAttribute) {
            return;
          }

          marker.setAttribute(RUNTIME_ATTRIBUTE, runtime);
          marker.setAttribute(TAGS_ATTRIBUTE, `runtime-${runtime}`);
        }

        function applyRuntimeVariant(runtime) {
          globalThis.document.documentElement?.setAttribute?.("data-browser-frame-runtime", runtime);
          globalThis.document.body?.setAttribute?.("data-browser-frame-runtime", runtime);
          syncRuntimeMarker(runtime);

          globalThis.document
            .querySelectorAll?.("[data-browser-frame-variant]")
            ?.forEach?.((element) => {
              const elementRuntime = normalizeText(element.getAttribute("data-browser-frame-variant"));
              element.hidden = elementRuntime !== runtime;
            });
        }

        applyRuntimeVariant(resolveRuntimeContext());
      }());
    </script>
