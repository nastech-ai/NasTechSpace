cols: 4
id: yt-video-list
name: AgentZero Videos
renderer: |-
  async (parent, currentSpace) => {
    parent.style.cssText = 'display:flex;flex-direction:column;gap:0;overflow:hidden;height:100%;background:#0f0f0f;border-radius:8px;';
  
    const CHANNEL_ID = 'UCm4Sy7W36u_ZFOZWX9cd07w'; // AgentZeroFW
  
    // The frontend runtime automatically retries blocked origins through /api/proxy.
    const RSS_URL = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID;
  
  
    const list = document.createElement('div');
    list.id = 'yt-list-container';
    list.style.cssText = 'flex:1;overflow-y:auto;padding:8px 0;';
    list.innerHTML = '<div style="color:#aaa;text-align:center;padding:20px;font-size:13px;">Loading videos...</div>';
    parent.appendChild(list);
  
    // Custom scrollbar
    const style = document.createElement('style');
    style.textContent = '#yt-list-container::-webkit-scrollbar{width:4px}#yt-list-container::-webkit-scrollbar-track{background:#0f0f0f}#yt-list-container::-webkit-scrollbar-thumb{background:#444;border-radius:2px}';
    parent.appendChild(style);
  
    function parseVideos(xml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'application/xml');
      const entries = Array.from(doc.querySelectorAll('entry'));
      return entries.map(e => {
        const videoId = e.querySelector('videoId')?.textContent || e.querySelector('id')?.textContent?.split(':').pop();
        const title = e.querySelector('title')?.textContent || '';
        const published = e.querySelector('published')?.textContent || '';
        const views = e.querySelector('statistics')?.getAttribute('views') || '';
        const thumb = 'https://i.ytimg.com/vi/' + videoId + '/mqdefault.jpg';
        const channelName = e.querySelector('author name')?.textContent || 'AgentZero FW';
        const date = published ? new Date(published).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}) : '';
        return { videoId, title, thumb, date, views, channelName };
      }).filter(v => v.videoId && v.videoId.length > 5);
    }
  
    function formatViews(v) {
      if (!v) return '';
      const n = parseInt(v);
      if (isNaN(n)) return '';
      if (n >= 1000000) return (n/1000000).toFixed(1) + 'M views';
      if (n >= 1000) return (n/1000).toFixed(0) + 'K views';
      return n + ' views';
    }
  
    function renderList(videos) {
      list.innerHTML = '';
      videos.forEach((v, i) => {
        const item = document.createElement('div');
        item.style.cssText = 'display:flex;gap:10px;padding:8px 12px;cursor:pointer;border-radius:4px;transition:background 0.15s;align-items:flex-start;';
        item.onmouseenter = () => item.style.background = '#272727';
        item.onmouseleave = () => item.style.background = 'transparent';
  
        const thumbWrap = document.createElement('div');
        thumbWrap.style.cssText = 'flex-shrink:0;position:relative;width:120px;height:68px;border-radius:4px;overflow:hidden;background:#1a1a1a;';
        const img = document.createElement('img');
        img.src = v.thumb;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
        img.onerror = () => { img.style.display='none'; };
        thumbWrap.appendChild(img);
  
        const info = document.createElement('div');
        info.style.cssText = 'flex:1;min-width:0;';
        const titleEl = document.createElement('div');
        titleEl.style.cssText = 'color:#fff;font-size:12px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;';
        titleEl.textContent = v.title;
        const meta = document.createElement('div');
        meta.style.cssText = 'color:#aaa;font-size:11px;line-height:1.4;';
        meta.textContent = [v.channelName, v.date, formatViews(v.views)].filter(Boolean).join(' • ');
  
        info.appendChild(titleEl);
        info.appendChild(meta);
        item.appendChild(thumbWrap);
        item.appendChild(info);
  
        item.addEventListener('click', () => {
          // Highlight selected
          list.querySelectorAll('[data-selected]').forEach(el => {
            el.removeAttribute('data-selected');
            el.style.background = 'transparent';
          });
          item.setAttribute('data-selected', '1');
          item.style.background = '#1a1a2e';
  
          // Send to player via custom event
          window.dispatchEvent(new CustomEvent('yt-play-video', { detail: { videoId: v.videoId, title: v.title, autoplay: true } }));
        });
  
        list.appendChild(item);
  
        // Auto-load first video into player without autoplay
        if (i === 0) {
          setTimeout(() => {
            item.setAttribute('data-selected', '1');
            item.style.background = '#1a1a2e';
            window.dispatchEvent(new CustomEvent('yt-play-video', { detail: { videoId: v.videoId, title: v.title, autoplay: false } }));
          }, 800);
        }
      });
    }
  
    try {
      const res = await space.fetchExternal(RSS_URL);
      if (!res.ok) throw new Error('Feed request failed: HTTP ' + res.status);
      const xmlText = await res.text();
      const videos = parseVideos(xmlText);
      if (videos.length === 0) throw new Error('No videos parsed');
      renderList(videos);
    } catch (err) {
      list.innerHTML = '<div style="color:#f44;text-align:center;padding:20px;font-size:12px;">Failed to load videos.<br><small>' + err.message + '</small></div>';
    }
  }
rows: 7
schema: space-widget/v1
col: -5
row: 0
