cols: 10
id: yt-video-player
name: YouTube Player
renderer: |-
  async (parent, currentSpace) => {
    parent.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#0f0f0f;border-radius:8px;overflow:hidden;';
  
  
    const playerWrap = document.createElement('div');
    playerWrap.style.cssText = 'flex:1;position:relative;background:#000;';
    parent.appendChild(playerWrap);
  
    const iframe = document.createElement('iframe');
    iframe.id = 'yt-player-iframe';
    iframe.title = 'Agent Zero video player';
    iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
    iframe.allowFullscreen = true;
    iframe.referrerPolicy = 'strict-origin-when-cross-origin';
    playerWrap.appendChild(iframe);
  
    function loadVideo(videoId, title, autoplay) {
      const ap = autoplay ? '1' : '0';
      iframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=' + ap + '&rel=0&modestbranding=1';
    }
  
    // Load newest video independently on init (no autoplay)
    const CHANNEL_ID = 'UCm4Sy7W36u_ZFOZWX9cd07w';
    const RSS_URL = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID;
  
    try {
      const res = await space.fetchExternal(RSS_URL);
      if (!res.ok) throw new Error('Feed request failed: HTTP ' + res.status);
      const xmlText = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'application/xml');
      const first = doc.querySelector('entry videoId');
      if (first?.textContent) {
        loadVideo(first.textContent, '', false);
      }
    } catch (e) {
      console.warn('Player init load failed', e);
    }
  
    // Listen for video selection from the list widget
    const handler = (e) => {
      const { videoId, title, autoplay } = e.detail || {};
      if (videoId) loadVideo(videoId, title, autoplay !== false);
    };
    window.addEventListener('yt-play-video', handler);
  
    // Return cleanup
    return () => {
      window.removeEventListener('yt-play-video', handler);
    };
  }
