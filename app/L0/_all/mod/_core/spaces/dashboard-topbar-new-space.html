<html>
  <head>
    <script type="module" src="/mod/_core/spaces/dashboard-topbar-new-space.js"></script>
  </head>
  <body>
    <div x-data="spacesDashboardTopbarNewSpace()">
      <button
        type="button"
        class="space-topbar-button"
        :disabled="creating"
        aria-label="Create a new space"
        title="Create a new space"
        @click="createSpace()"
      >
        <x-icon x-text="creating ? 'hourglass_top' : 'add'"></x-icon>
        <span x-text="creating ? 'Creating…' : 'New Space'"></span>
      </button>
    </div>
  </body>
</html>
