<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/file_explorer/file-explorer.css" />
    <script type="module" src="/mod/_core/file_explorer/store.js"></script>
  </head>
  <body>
    <div x-data class="file-explorer-root">
      <template x-if="$store.fileExplorer">
        <section
          class="space-panel file-explorer-panel"
          x-cloak
          x-init="$nextTick(() => $store.fileExplorer.mount({ actionMenu: $refs.actionMenu, createDialog: $refs.createDialog, deleteDialog: $refs.deleteDialog, editorDialog: $refs.editorDialog, list: $refs.list, renameDialog: $refs.renameDialog }))"
          x-destroy="$store.fileExplorer.unmount()"
        >
          <div class="space-card file-explorer-browser">
            <div class="file-explorer-toolbar">
              <div class="file-explorer-toolbar-row">
                <button
                  class="secondary-button file-explorer-action file-explorer-action--icon"
                  type="button"
                  :disabled="$store.fileExplorer.isWorking || !$store.fileExplorer.canGoUp"
                  @click="$store.fileExplorer.navigateUp({ focusList: true })"
                  title="Go to parent folder"
                  aria-label="Go to parent folder"
                >
                  <x-icon>arrow_upward</x-icon>
                </button>

                <button
                  class="secondary-button file-explorer-action file-explorer-action--icon"
                  type="button"
                  :disabled="$store.fileExplorer.isWorking"
                  @click="$store.fileExplorer.navigateHome({ focusList: true })"
                  title="Go to home folder"
                  aria-label="Go to home folder"
                >
                  <x-icon>home</x-icon>
                </button>

                <div class="file-explorer-path-input">
                  <x-icon>folder_open</x-icon>
                  <input
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                    x-model="$store.fileExplorer.draftPath"
                    @keydown.enter.prevent="$store.fileExplorer.submitDraftPath({ focusList: true })"
                  />
                </div>

                <button
                  class="secondary-button file-explorer-action file-explorer-action--icon"
                  type="button"
                  :disabled="$store.fileExplorer.isWorking"
                  @click="$store.fileExplorer.refresh({ focusList: true })"
                  title="Refresh current folder"
                  aria-label="Refresh current folder"
                >
                  <x-icon>refresh</x-icon>
                </button>

                <button
                  class="secondary-button file-explorer-action file-explorer-action--icon"
                  type="button"
                  :disabled="!$store.fileExplorer.canCreateInCurrentDirectory"
                  @click="$store.fileExplorer.openCreateFileDialog()"
                  title="Create file"
                  aria-label="Create file"
                >
                  <x-icon>note_add</x-icon>
                </button>

                <button
                  class="secondary-button file-explorer-action file-explorer-action--icon"
                  type="button"
                  :disabled="!$store.fileExplorer.canCreateInCurrentDirectory"
                  @click="$store.fileExplorer.openCreateFolderDialog()"
                  title="Create folder"
                  aria-label="Create folder"
                >
                  <x-icon>create_new_folder</x-icon>
                </button>
              </div>

              <template x-if="$store.fileExplorer.hasClipboard">
                <div class="file-explorer-summary-row file-explorer-summary-row--clipboard">
                  <div class="file-explorer-summary-copy">
                    <span class="file-explorer-summary-label" x-text="$store.fileExplorer.clipboardLabel"></span>
                    <span class="file-explorer-summary-note" x-text="$store.fileExplorer.clipboardPreviewText"></span>
                  </div>

                  <div class="file-explorer-summary-actions">
                    <button
                      class="secondary-button file-explorer-summary-action"
                      type="button"
                      :disabled="!$store.fileExplorer.canPasteClipboard"
                      @click="$store.fileExplorer.pasteClipboardIntoCurrentDirectory()"
                    >
                      <x-icon>content_paste</x-icon>
                      <span>Paste Here</span>
                    </button>

                    <button
                      class="secondary-button file-explorer-summary-action"
                      type="button"
                      @click="$store.fileExplorer.toggleClipboardExpanded()"
                    >
                      <x-icon x-text="$store.fileExplorer.clipboardExpanded ? 'expand_less' : 'expand_more'"></x-icon>
                      <span x-text="$store.fileExplorer.clipboardExpandedToggleLabel"></span>
                    </button>
                  </div>
                </div>
              </template>

              <template x-if="$store.fileExplorer.hasClipboard && $store.fileExplorer.clipboardExpanded">
                <div class="file-explorer-clipboard-list">
                  <template x-for="item in $store.fileExplorer.clipboardItems" :key="item.path">
                    <div class="file-explorer-clipboard-item">
                      <div class="file-explorer-clipboard-copy">
                        <span class="file-explorer-clipboard-icon">
                          <x-icon x-text="item.isDirectory ? 'folder' : 'description'"></x-icon>
                        </span>
                        <span class="file-explorer-clipboard-text">
                          <span class="file-explorer-clipboard-name" x-text="item.name"></span>
                          <span class="file-explorer-clipboard-path" x-text="item.path"></span>
                        </span>
                      </div>

                      <button
                        class="secondary-button file-explorer-mini-action"
                        type="button"
                        @click="$store.fileExplorer.removeClipboardItem(item.path)"
                        :title="`Remove ${item.name} from ${$store.fileExplorer.clipboardActionLabel.toLowerCase()}`"
                      >
                        <x-icon>close</x-icon>
                      </button>
                    </div>
                  </template>
                </div>
              </template>

              <template x-if="$store.fileExplorer.hasSelection">
                <div class="file-explorer-summary-row file-explorer-summary-row--selection">
                  <div class="file-explorer-summary-copy">
                    <span class="file-explorer-summary-label" x-text="$store.fileExplorer.selectionLabel"></span>
                    <span class="file-explorer-summary-note" x-text="$store.fileExplorer.selectionPreviewText"></span>
                  </div>

                  <div class="file-explorer-summary-actions">
                    <button
                      class="secondary-button file-explorer-summary-action"
                      type="button"
                      :disabled="!$store.fileExplorer.canSelectAllEntries"
                      @click="$store.fileExplorer.selectAllEntries({ focusList: true })"
                      title="Select all items in this folder"
                    >
                      <x-icon>select_all</x-icon>
                      <span>Select All</span>
                    </button>

                    <button
                      class="secondary-button file-explorer-summary-action file-explorer-summary-action--icon"
                      type="button"
                      :disabled="$store.fileExplorer.isWorking"
                      @click.stop="$store.fileExplorer.toggleActionMenuForSelection($event)"
                      title="Selection actions"
                    >
                      <x-icon>more_horiz</x-icon>
                    </button>

                    <button
                      class="secondary-button file-explorer-summary-action file-explorer-summary-action--icon"
                      type="button"
                      :disabled="$store.fileExplorer.isWorking"
                      @click="$store.fileExplorer.clearSelection({ focusList: true })"
                      title="Clear selection"
                    >
                      <x-icon>close</x-icon>
                    </button>
                  </div>
                </div>
              </template>

              <template x-if="$store.fileExplorer.noticeText">
                <div
                  class="file-explorer-notice"
                  :class="{ 'is-error': $store.fileExplorer.noticeTone === 'error' }"
                >
                  <x-icon x-text="$store.fileExplorer.noticeTone === 'error' ? 'error' : 'info'"></x-icon>
                  <span x-text="$store.fileExplorer.noticeText"></span>
                </div>
              </template>
            </div>

            <div
              class="file-explorer-list"
              x-ref="list"
              tabindex="0"
              role="listbox"
              :aria-activedescendant="$store.fileExplorer.activeDescendantId"
              :aria-busy="String($store.fileExplorer.loading)"
              @keydown="$store.fileExplorer.handleListKeydown($event)"
              @scroll="$store.fileExplorer.captureScroll()"
            >
              <template x-if="$store.fileExplorer.loading && !$store.fileExplorer.entries.length">
                <div class="file-explorer-empty">
                  <x-icon>hourglass_empty</x-icon>
                  <p>Loading folder...</p>
                  <p>Please wait while the browser reads the current path.</p>
                </div>
              </template>

              <template x-if="!$store.fileExplorer.loading && $store.fileExplorer.errorTitle">
                <div class="file-explorer-empty is-warning">
                  <x-icon>error</x-icon>
                  <p x-text="$store.fileExplorer.errorTitle"></p>
                  <p x-text="$store.fileExplorer.errorDetail"></p>
                </div>
              </template>

              <template x-if="!$store.fileExplorer.loading && !$store.fileExplorer.errorTitle && !$store.fileExplorer.entries.length">
                <div class="file-explorer-empty">
                  <x-icon>folder_off</x-icon>
                  <p>This folder is empty.</p>
                  <p>No readable files or subfolders were returned for the current path.</p>
                </div>
              </template>

              <template x-for="entry in $store.fileExplorer.entries" :key="entry.path">
                <div
                  :id="$store.fileExplorer.getEntryDomId(entry.path)"
                  class="file-explorer-entry"
                  :class="{
                    'is-checked': $store.fileExplorer.isSelected(entry.path),
                    'is-highlighted': $store.fileExplorer.highlightedPath === entry.path
                  }"
                  :aria-selected="String($store.fileExplorer.highlightedPath === entry.path)"
                  role="option"
                >
                  <button
                    class="file-explorer-entry-toggle"
                    type="button"
                    tabindex="-1"
                    :disabled="$store.fileExplorer.isWorking"
                    :title="`${$store.fileExplorer.isSelected(entry.path) ? 'Unselect' : 'Select'} ${entry.name}`"
                    @click.stop="$store.fileExplorer.toggleSelection(entry.path, { focusList: true, scrollIntoView: false })"
                  >
                    <x-icon x-text="$store.fileExplorer.isSelected(entry.path) ? 'check_box' : 'check_box_outline_blank'"></x-icon>
                  </button>

                  <button
                    class="file-explorer-entry-main"
                    type="button"
                    tabindex="-1"
                    :title="entry.path"
                    @click="$store.fileExplorer.selectEntry(entry.path, { focusList: true })"
                    @dblclick="$store.fileExplorer.handleEntryDoubleClick(entry.path, { focusList: true })"
                  >
                    <span class="file-explorer-entry-icon">
                      <x-icon x-text="entry.icon"></x-icon>
                    </span>

                    <span class="file-explorer-entry-copy">
                      <span class="file-explorer-entry-name" x-text="entry.name"></span>
                      <span class="file-explorer-entry-path" x-text="entry.path"></span>
                    </span>
                  </button>

                  <button
                    x-show="!$store.fileExplorer.hasSelection"
                    class="secondary-button file-explorer-entry-action"
                    type="button"
                    tabindex="-1"
                    :disabled="$store.fileExplorer.isWorking"
                    :title="`Actions for ${entry.name}`"
                    @click.stop="$store.fileExplorer.toggleActionMenuForEntry(entry.path, $event)"
                  >
                    <x-icon>more_horiz</x-icon>
                  </button>
                </div>
              </template>
            </div>
          </div>

          <template x-teleport="body">
            <div class="space-popover-layer" x-show="$store.fileExplorer.isActionMenuOpen" x-cloak>
              <div
                class="space-popover-panel file-explorer-action-menu"
                x-ref="actionMenu"
                x-show="$store.fileExplorer.isActionMenuOpen"
                :style="$store.fileExplorer.actionMenuStyle"
                @click.outside="$store.fileExplorer.closeActionMenu()"
                @keydown.escape.window="$store.fileExplorer.closeActionMenu()"
              >
                <template x-for="action in $store.fileExplorer.actionMenuActions" :key="action.id">
                  <button
                    type="button"
                    class="space-popover-action"
                    :class="{ 'is-danger': action.danger }"
                    @click="$store.fileExplorer.submitActionMenuAction(action.id)"
                  >
                    <x-icon x-text="action.icon"></x-icon>
                    <span class="space-popover-action-label" x-text="action.label"></span>
                  </button>
                </template>
              </div>
            </div>
          </template>

          <template x-teleport="body">
            <div class="space-dialog-layer">
              <dialog class="chat-dialog" x-ref="createDialog" @cancel.prevent="$store.fileExplorer.closeCreateDialog()">
                <form method="dialog" class="dialog-card file-explorer-dialog-card" @submit.prevent="$store.fileExplorer.submitCreateDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">File Browser</p>
                      <h2 x-text="$store.fileExplorer.createDialogTitle"></h2>
                    </div>
                  </header>

                  <label class="field">
                    <span>Name</span>
                    <input type="text" autocomplete="off" x-model="$store.fileExplorer.createDraftName" />
                  </label>

                  <p class="dialog-note">
                    <code x-text="$store.fileExplorer.createDialogPathPreview || $store.fileExplorer.currentPath"></code>
                  </p>

                  <template x-if="$store.fileExplorer.createDialogError">
                    <p class="dialog-note file-explorer-dialog-note is-error" x-text="$store.fileExplorer.createDialogError"></p>
                  </template>

                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.fileExplorer.closeCreateDialog()">Cancel</button>
                    <button type="submit" class="confirm-button" :disabled="$store.fileExplorer.createDialogSaving">
                      <span x-text="$store.fileExplorer.createDialogSaving ? 'Creating...' : 'Create'"></span>
                    </button>
                  </div>
                </form>
              </dialog>

              <dialog class="chat-dialog" x-ref="renameDialog" @cancel.prevent="$store.fileExplorer.closeRenameDialog()">
                <form method="dialog" class="dialog-card file-explorer-dialog-card" @submit.prevent="$store.fileExplorer.submitRenameDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">File Browser</p>
                      <h2 x-text="$store.fileExplorer.renameDialogTitle"></h2>
                    </div>
                  </header>

                  <label class="field">
                    <span>Name</span>
                    <input type="text" autocomplete="off" x-model="$store.fileExplorer.renameDraftName" />
                  </label>

                  <template x-if="$store.fileExplorer.renameDialogError">
                    <p class="dialog-note file-explorer-dialog-note is-error" x-text="$store.fileExplorer.renameDialogError"></p>
                  </template>

                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.fileExplorer.closeRenameDialog()">Cancel</button>
                    <button type="submit" class="confirm-button" :disabled="$store.fileExplorer.renameDialogSaving">
                      <span x-text="$store.fileExplorer.renameDialogSaving ? 'Saving...' : 'Rename'"></span>
                    </button>
                  </div>
                </form>
              </dialog>

              <dialog class="chat-dialog" x-ref="deleteDialog" @cancel.prevent="$store.fileExplorer.closeDeleteDialog()">
                <form method="dialog" class="dialog-card file-explorer-dialog-card" @submit.prevent="$store.fileExplorer.submitDeleteDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">File Browser</p>
                      <h2>Deletion confirmation</h2>
                    </div>
                  </header>

                  <div class="file-explorer-delete-preview">
                    <template x-for="entry in $store.fileExplorer.deleteDialogEntries" :key="entry.path">
                      <div class="file-explorer-delete-preview-item">
                        <x-icon x-text="entry.isDirectory ? 'folder' : 'description'"></x-icon>
                        <span class="file-explorer-delete-preview-copy">
                          <span class="file-explorer-delete-preview-name" x-text="entry.name"></span>
                          <span class="file-explorer-delete-preview-path" x-text="entry.path"></span>
                        </span>
                      </div>
                    </template>
                  </div>

                  <template x-if="$store.fileExplorer.deleteDialogError">
                    <p class="dialog-note file-explorer-dialog-note is-error" x-text="$store.fileExplorer.deleteDialogError"></p>
                  </template>

                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.fileExplorer.closeDeleteDialog()">Cancel</button>
                    <button type="submit" class="secondary-button danger" :disabled="$store.fileExplorer.deleteDialogSaving">
                      <span x-text="$store.fileExplorer.deleteDialogSaving ? 'Removing...' : 'Remove'"></span>
                    </button>
                  </div>
                </form>
              </dialog>

              <dialog class="chat-dialog" x-ref="editorDialog" @cancel.prevent="$store.fileExplorer.closeEditorDialog()">
                <form method="dialog" class="dialog-card dialog-card-raw file-explorer-dialog-card" @submit.prevent="$store.fileExplorer.submitEditorDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">File Browser</p>
                      <h2 x-text="$store.fileExplorer.editorDialogTitle"></h2>
                    </div>
                  </header>

                  <p class="dialog-note">
                    <code x-text="$store.fileExplorer.editorDialogPath || '[No file selected]'"></code>
                  </p>

                  <label class="field">
                    <span>Contents</span>
                    <textarea
                      rows="18"
                      spellcheck="false"
                      :disabled="$store.fileExplorer.editorDialogLoading || $store.fileExplorer.editorDialogSaving"
                      x-model="$store.fileExplorer.editorDraftContent"
                    ></textarea>
                  </label>

                  <template x-if="$store.fileExplorer.editorDialogLoading">
                    <p class="dialog-note">Loading file contents...</p>
                  </template>

                  <template x-if="$store.fileExplorer.editorDialogError">
                    <p class="dialog-note file-explorer-dialog-note is-error" x-text="$store.fileExplorer.editorDialogError"></p>
                  </template>

                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.fileExplorer.closeEditorDialog()">Cancel</button>
                    <button
                      type="submit"
                      class="confirm-button"
                      :disabled="$store.fileExplorer.editorDialogLoading || $store.fileExplorer.editorDialogSaving"
                    >
                      <span x-text="$store.fileExplorer.editorDialogSaving ? 'Saving...' : 'Save'"></span>
                    </button>
                  </div>
                </form>
              </dialog>
            </div>
          </template>
        </section>
      </template>
    </div>
  </body>
</html>
