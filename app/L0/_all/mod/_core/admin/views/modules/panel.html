<html>
  <head>
    <script type="module" src="/mod/_core/admin/views/modules/store.js"></script>
  </head>
  <body>
    <div x-data>
      <template x-if="$store.adminModules">
        <section
          class="admin-panel"
          x-cloak
          x-init="$store.adminModules.load()"
        >
          <div class="admin-modules-header">
            <div class="admin-modules-heading">
              <h2 class="admin-modules-title">Installed modules</h2>
              <p class="admin-modules-subtitle" x-text="$store.adminModules.currentAreaOption.description"></p>
            </div>

            <div class="admin-modules-controls">
              <label class="admin-modules-control admin-modules-control--search">
                <span>Search</span>
                <div class="admin-modules-search-field">
                  <x-icon>search</x-icon>
                  <input
                    type="search"
                    placeholder="Search author or module name"
                    :value="$store.adminModules.search"
                    @input="$store.adminModules.setSearch($event.target.value)"
                  />
                </div>
              </label>

              <label class="admin-modules-control admin-modules-control--area">
                <span>Area</span>
                <select
                  :value="$store.adminModules.area"
                  @change="$store.adminModules.setArea($event.target.value)"
                >
                  <template x-for="option in $store.adminModules.areaOptions" :key="option.value">
                    <option :value="option.value" x-text="option.label"></option>
                  </template>
                </select>
              </label>

              <button
                class="admin-modules-refresh"
                type="button"
                :disabled="$store.adminModules.loading"
                @click="$store.adminModules.refresh()"
                title="Refresh"
              >
                <x-icon>refresh</x-icon>
              </button>
            </div>
          </div>

          <template x-if="$store.adminModules.error">
            <div class="admin-card admin-info-card admin-info-card--warning">
              <p><x-icon>error</x-icon> <span x-text="$store.adminModules.error"></span></p>
            </div>
          </template>

          <template x-if="$store.adminModules.loading && !$store.adminModules.loaded">
            <div class="admin-card admin-placeholder">
              <x-icon>hourglass_empty</x-icon>
              <p>Loading modules...</p>
            </div>
          </template>

          <template x-if="$store.adminModules.loaded && $store.adminModules.modules.length === 0">
            <div class="admin-card admin-placeholder">
              <x-icon>package_2</x-icon>
              <p x-text="$store.adminModules.emptyTitle"></p>
              <p x-text="$store.adminModules.emptyDescription"></p>
            </div>
          </template>

          <template x-if="$store.adminModules.loaded && $store.adminModules.modules.length > 0">
            <ul class="admin-module-list">
              <template x-for="mod in $store.adminModules.modules" :key="mod.id">
                <li class="admin-module-item">
                  <div class="admin-module-main">
                    <div class="admin-module-name-row">
                      <span class="admin-module-author" x-text="mod.authorId"></span>
                      <span class="admin-module-slash" aria-hidden="true">/</span>
                      <span class="admin-module-repository" x-text="mod.repositoryId"></span>
                    </div>

                    <div class="admin-module-context-row">
                      <span class="admin-module-context-item">
                        <x-icon>layers</x-icon>
                        <span x-text="mod.layer"></span>
                      </span>

                      <span class="admin-module-context-item">
                        <x-icon x-text="$store.adminModules.getOwnerIcon(mod)"></x-icon>
                        <span x-text="$store.adminModules.formatOwner(mod)"></span>
                      </span>
                    </div>

                    <div class="admin-module-meta">
                      <span class="admin-module-git">
                        <x-icon>source</x-icon>
                        <span x-text="$store.adminModules.formatGitSummary(mod.git)"></span>
                      </span>

                      <template x-if="$store.adminModules.formatOwnerPreview(mod)">
                        <span class="admin-module-owner-preview">
                          <x-icon>group</x-icon>
                          <span x-text="$store.adminModules.formatOwnerPreview(mod)"></span>
                        </span>
                      </template>
                    </div>
                  </div>

                  <div class="admin-module-actions">
                    <button
                      class="admin-module-action"
                      type="button"
                      disabled
                      :title="$store.adminModules.getFileBrowserTitle(mod)"
                    >
                      <x-icon>folder_open</x-icon>
                    </button>

                    <button
                      class="admin-module-action"
                      type="button"
                      :disabled="!$store.adminModules.canRemove(mod)"
                      :title="$store.adminModules.getRemoveTitle(mod)"
                      @click="$store.adminModules.removeModule(mod)"
                    >
                      <x-icon x-text="$store.adminModules.isRemoving(mod) ? 'hourglass_top' : 'delete'"></x-icon>
                    </button>

                    <button
                      class="admin-module-action"
                      type="button"
                      :disabled="!$store.adminModules.canOpenRepository(mod)"
                      :title="$store.adminModules.getRepositoryTitle(mod)"
                      @click="$store.adminModules.openRepository(mod)"
                    >
                      <x-icon>open_in_new</x-icon>
                    </button>
                  </div>
                </li>
              </template>
            </ul>
          </template>
        </section>
      </template>
    </div>
  </body>
</html>
