<html>
  <head>
    <script type="module" src="/mod/_core/dashboard_welcome/dashboard-topbar-toggle.js"></script>
  </head>
  <body>
    <div x-data="dashboardWelcomeTopbarToggle()" x-init="init()" x-destroy="destroy()">
      <template x-if="ready && hidden">
        <button
          type="button"
          class="space-topbar-button"
          :disabled="savingPreference"
          aria-label="Show welcome panel"
          title="Show welcome panel"
          @click="showWelcome()"
        >
          <x-icon x-text="savingPreference ? 'hourglass_top' : 'visibility'"></x-icon>
          <span>Welcome</span>
        </button>
      </template>
    </div>
  </body>
</html>
