<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/visual/index.css" />
    <link rel="stylesheet" href="/mod/_core/router/router.css" />
    <script type="module" src="/mod/_core/router/router-page.js"></script>
  </head>
  <body>
    <div x-data>
      <template x-if="$store.router">
        <div
          class="router-shell"
          x-cloak
          x-init="$nextTick(() => { space.visual?.installStaticBackdrop?.($refs.backdrop); $store.router.mount({ outlet: $refs.outlet, viewport: $refs.viewport }); })"
          x-destroy="space.visual?.destroyStaticBackdrop?.($refs.backdrop); $store.router.unmount()"
        >
          <x-context :data-tags="$store.router.current?.path ? `route:${$store.router.current.path}` : ''"></x-context>
          <div class="space-backdrop" x-ref="backdrop" data-space-backdrop aria-hidden="true">
            <div class="space-backdrop-layer space-backdrop-glow"></div>
            <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-deep"></div>
            <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-far"></div>
            <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-mid"></div>
            <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-near"></div>
            <div class="space-backdrop-layer space-backdrop-stars space-backdrop-stars-close"></div>
          </div>

          <div class="router-shell-content">
            <x-extension id="_core/router/shell_start"></x-extension>

            <main class="router-stage" x-ref="viewport">
              <div class="router-stage-inner" x-ref="stageInner">
                <x-extension id="page/router/route/start"></x-extension>
                <section class="router-route-frame">
                  <div class="router-route-outlet" x-ref="outlet"></div>
                </section>
                <x-extension id="page/router/route/end"></x-extension>
              </div>
            </main>

            <div class="router-overlay-layer">
              <x-extension id="page/router/overlay/start"></x-extension>
              <x-extension id="page/router/overlay/end"></x-extension>
            </div>

            <x-extension id="_core/router/shell_end"></x-extension>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
